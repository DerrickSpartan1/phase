# Comprehensive Rules Section 510: Combat Damage Step

[_meta]
section = 510
title = "Combat Damage Step"

[cr_510_1]
rule = "510.1"
text = "First, the active player announces how each attacking creature assigns its combat damage, then the defending player announces how each blocking creature assigns its combat damage. This turn-based action doesn't use the stack. A player assigns a creature's combat damage according to the following rules:"
status = "implemented"
impl_files = ["game/combat_damage.rs:18", "game/combat_damage.rs:60", "game/filter.rs:354", "game/game_object.rs:266", "game/turns.rs:523", "parser/oracle_target.rs:1177", "parser/oracle_target.rs:1235", "types/ability.rs:843"]
test_files = []
notes = ""

[cr_510_1a]
rule = "510.1a"
text = "Each attacking creature and each blocking creature assigns combat damage equal to its power. Creatures that would assign 0 or less damage this way don't assign combat damage at all."
status = "implemented"
impl_files = ["game/combat_damage.rs:13", "game/combat_damage.rs:21"]
test_files = []
notes = ""

[cr_510_1b]
rule = "510.1b"
text = "An unblocked creature assigns its combat damage to the player, planeswalker, or battle it's attacking. If it isn't currently attacking anything (if, for example, it was attacking a planeswalker that has left the battlefield), it assigns no combat damage."
status = "implemented"
impl_files = ["game/combat_damage.rs:365"]
test_files = []
notes = ""

[cr_510_1c]
rule = "510.1c"
text = "A blocked creature assigns its combat damage to the creatures blocking it. If no creatures are currently blocking it (if, for example, they were destroyed or removed from combat), it assigns no combat damage. If exactly one creature is blocking it, it assigns all its combat damage to that creature. If two or more creatures are blocking it, it assigns its combat damage to those creatures divided as its controller chooses among them."
status = "implemented"
impl_files = ["ai_support/candidates.rs:614", "game/combat_damage.rs:191", "game/combat_damage.rs:329", "game/combat_damage.rs:360", "game/combat_damage.rs:818", "game/engine.rs:2646", "game/engine.rs:2667", "game/filter.rs:329", "parser/oracle_static.rs:203", "parser/oracle_static.rs:952", "parser/oracle_static.rs:4240", "parser/oracle_static.rs:4244", "parser/oracle_static.rs:4263", "parser/oracle_static.rs:4286", "types/ability.rs:824", "types/ability.rs:3723", "types/actions.rs:149", "types/game_state.rs:609", "types/game_state.rs:649", "types/layers.rs:86"]
test_files = []
notes = ""

[cr_510_1d]
rule = "510.1d"
text = "A blocking creature assigns combat damage to the creatures it's blocking. If it isn't currently blocking any creatures (if, for example, they were destroyed or removed from combat), it assigns no combat damage. If it's blocking exactly one creature, it assigns all its combat damage to that creature. If it's blocking two or more creatures, it assigns its combat damage divided as its controller chooses among them."
status = "implemented"
impl_files = ["game/combat_damage.rs:243", "game/combat_damage.rs:286"]
test_files = []
notes = ""

[cr_510_1e]
rule = "510.1e"
text = "Once a player has assigned combat damage from each attacking or blocking creature they control, the total damage assignment (not solely the damage assignment of any individual attacking or blocking creature) is checked to see if it complies with the above rules. If it doesn't, the combat damage assignment is illegal; the game returns to the moment before that player began to assign combat damage. (See rule 732, \"Handling Illegal Actions.\")"
status = "partial"
impl_files = ["game/combat_damage.rs:191", "game/combat_damage.rs:329"]
test_files = []
notes = "The engine validates that each individual creature's damage assignment is legal (non-negative, assigns to valid targets) but does not perform a post-declaration total-legality check across all assignments simultaneously."

[cr_510_2]
rule = "510.2"
text = "Second, all combat damage that's been assigned is dealt simultaneously. This turn-based action doesn't use the stack. No player has the chance to cast spells or activate abilities between the time combat damage is assigned and the time it's dealt."
status = "implemented"
impl_files = ["game/combat.rs:36", "game/combat_damage.rs:100", "game/combat_damage.rs:118", "game/combat_damage.rs:428", "game/turns.rs:523"]
test_files = []
notes = ""

[cr_510_3]
rule = "510.3"
text = "Third, the active player gets priority. (See rule 117, \"Timing and Priority.\")"
status = "implemented"
impl_files = ["game/turns.rs:535"]
test_files = []
notes = "After resolve_combat_damage() completes and any triggers/SBAs fire, auto_advance() returns WaitingFor::Priority if the stack is non-empty, otherwise advances to EndCombat and checks for end-of-combat triggers before granting priority."

[cr_510_3a]
rule = "510.3a"
text = "Any abilities that triggered on damage being dealt or while state-based actions are performed afterward are put onto the stack before the active player gets priority; the order in which they triggered doesn't matter. (See rule 603, \"Handling Triggered Abilities.\")"
status = "implemented"
impl_files = ["game/combat_damage.rs:428", "game/turns.rs:533"]
test_files = []
notes = "combat_damage::resolve_combat_damage() processes SBAs and triggers after dealing damage. auto_advance() then grants priority if the stack is non-empty, ensuring all triggered abilities are on the stack before priority is given."

[cr_510_4]
rule = "510.4"
text = "If at least one attacking or blocking creature has first strike (see rule 702.7) or double strike (see rule 702.4) as the combat damage step begins, the only creatures that assign combat damage in that step are those with first strike or double strike. After that step, instead of proceeding to the end of combat step, the phase gets a second combat damage step. The only creatures that assign combat damage in that step are the remaining attackers and blockers that had neither first strike nor double strike as the first combat damage step began, as well as the remaining attackers and blockers that currently have double strike. After that step, the phase proceeds to the end of combat step."
status = "implemented"
impl_files = ["game/combat_damage.rs:110"]
test_files = []
notes = ""
