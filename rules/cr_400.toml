# Comprehensive Rules Section 400: General (Zones)

[_meta]
section = 400
title = "General (Zones)"

[cr_400_1]
rule = "400.1"
text = "A zone is a place where objects can be during a game. There are normally seven zones: library, hand, battlefield, graveyard, stack, exile, and command. Some older cards also use the ante zone. Each player has their own library, hand, and graveyard. The other zones are shared by all players."
status = "implemented"
impl_files = ["game/zones.rs:279", "types/zones.rs:4"]
test_files = []
notes = ""

[cr_400_2]
rule = "400.2"
text = "Public zones are zones in which all players can see the cards' faces, except for those cards that some rule or effect specifically allow to be face down. Graveyard, battlefield, stack, exile, ante, and command are public zones. Hidden zones are zones in which not all players can be expected to see the cards' faces. Library and hand are hidden zones, even if all the cards in one such zone happen to be revealed."
status = "implemented"
impl_files = ["parser/oracle_static.rs:58", "types/statics.rs:116"]
test_files = []
notes = ""

[cr_400_3]
rule = "400.3"
text = "If an object would go to any library, graveyard, or hand other than its owner's, it goes to its owner's corresponding zone."
status = "implemented"
impl_files = ["game/effects/bounce.rs:43", "parser/oracle_replacement.rs:671"]
test_files = []
notes = ""

[cr_400_4]
rule = "400.4"
text = "Cards with certain card types can't enter certain zones."
status = "implemented"
impl_files = ["game/zones.rs:53", "game/zones.rs:318"]
test_files = ["game/zones.rs:658"]
notes = "Umbrella rule covered by 400.4a (instant/sorcery can't enter battlefield, enforced in move_to_zone). 400.4b (command zone) is partial — see that entry."

[cr_400_4a]
rule = "400.4a"
text = "If an instant or sorcery card would enter the battlefield, it remains in its previous zone."
status = "implemented"
impl_files = ["game/zones.rs:318", "game/zones.rs:678"]
test_files = []
notes = ""

[cr_400_4b]
rule = "400.4b"
text = "If a conspiracy, phenomenon, plane, scheme, or vanguard card would leave the command zone, it remains in the command zone."
status = "not-applicable"
impl_files = []
test_files = []
notes = "These card types (conspiracy, plane, scheme, vanguard, phenomenon) are not supported in the engine. Commander commanders use a different redirect rule (CR 903.9a) which is implemented. This sub-rule is not applicable to the game modes supported."

[cr_400_5]
rule = "400.5"
text = "The order of objects in a library, in a graveyard, or on the stack can't be changed except when effects or rules allow it. The same is true for objects arranged in face-down piles in other zones. Other objects in other zones can be arranged however their owners wish, although who controls those objects, whether they're tapped or flipped, and what other objects are attached to them must remain clear to all players."
status = "implemented"
impl_files = ["game/effects/put_on_top_or_bottom.rs:38"]
test_files = []
notes = ""

[cr_400_6]
rule = "400.6"
text = "If an object would move from one zone to another, determine what event is moving the object. If the object is moving to a public zone and its owner will be able to look at it in that zone, its owner looks at it to see if it has any abilities that would affect the move. If the object is moving to the battlefield, each other player who will be able to look at it in that zone does so. Then any appropriate replacement effects, whether they come from that object or from elsewhere, are applied to that event. If any effects or rules try to do two or more contradictory or mutually exclusive things to a particular object, that object's controller—or its owner if it has no controller—chooses which effect to apply, and what that effect does. (Note that multiple instances of the same thing may be mutually exclusive; for example, two simultaneous “destroy” effects.) Then the event moves the object."
status = "implemented"
impl_files = ["game/effects/bounce.rs:9"]
test_files = []
notes = ""

[cr_400_7]
rule = "400.7"
text = "An object that moves from one zone to another becomes a new object with no memory of, or relation to, its previous existence. This rule has the following exceptions."
status = "implemented"
impl_files = ["game/effects/change_zone.rs:222", "game/effects/change_zone.rs:232", "game/effects/change_zone.rs:576", "game/effects/change_zone.rs:1002", "game/effects/delayed_trigger.rs:96", "game/effects/exile_from_top_until.rs:51", "game/effects/mod.rs:902", "game/effects/set_class_level.rs:221", "game/filter.rs:356", "game/layers.rs:170", "game/printed_cards.rs:67", "game/quantity.rs:293", "game/restrictions.rs:210", "game/sba.rs:595", "game/triggers.rs:962", "game/turns.rs:67", "game/zones.rs:30", "game/zones.rs:67", "game/zones.rs:78", "game/zones.rs:90", "game/zones.rs:100", "game/zones.rs:120", "game/zones.rs:201", "game/zones.rs:210", "game/zones.rs:235", "game/zones.rs:245", "parser/oracle_effect/imperative.rs:300", "parser/oracle_effect/mod.rs:1957", "parser/oracle_effect/mod.rs:2750", "parser/oracle_effect/types.rs:253", "parser/oracle_static.rs:1266", "parser/oracle_target.rs:1178", "parser/oracle_trigger.rs:366", "types/ability.rs:846", "types/ability.rs:1276", "types/ability.rs:1709", "types/ability.rs:3018", "types/ability.rs:3122", "types/game_state.rs:113", "types/game_state.rs:123", "types/game_state.rs:814", "types/game_state.rs:995", "types/game_state.rs:1043", "types/game_state.rs:1048", "types/game_state.rs:1113"]
test_files = []
notes = ""

[cr_400_7a]
rule = "400.7a"
text = "Effects from spells, activated abilities, and triggered abilities that change the characteristics or controller of a permanent spell on the stack continue to apply to the permanent that spell becomes."
status = "partial"
impl_files = ["game/layers.rs"]
test_files = []
notes = "The layers system (game/layers.rs) applies continuous effects to permanents on the battlefield, but the rule requires that effects granted to a spell on the stack persist to the resolved permanent. The engine tracks some cases (e.g. enter_tapped, enter_transformed) but does not have a general mechanism to carry arbitrary characteristic-changing effects from the stack object to the resolved permanent. Needs manual verification."

[cr_400_7b]
rule = "400.7b"
text = "Effects from static abilities that grant an ability to a permanent spell that functions on the battlefield continue to apply to the permanent that spell becomes (see rule 611.3d)."
status = "partial"
impl_files = ["game/static_abilities.rs", "game/layers.rs"]
test_files = []
notes = "The static ability layer system (game/static_abilities.rs, game/layers.rs) applies continuous grants to permanents on the battlefield. The rule requires persistence specifically from static abilities applied to a spell-on-the-stack into the resolved permanent. General coverage relies on the layers running after ETB. Needs manual verification for the spell-on-stack phase."

[cr_400_7c]
rule = "400.7c"
text = "Prevention effects that apply to damage from a permanent spell on the stack continue to apply to damage from the permanent that spell becomes."
status = "missing"
impl_files = []
test_files = []
notes = "Prevention effects on stack spells transferring to resolved permanents is not explicitly implemented. Prevention is handled in game/effects/prevent_damage.rs but not tracked across the spell-to-permanent transition."

[cr_400_7d]
rule = "400.7d"
text = "An ability of a permanent can reference information about the spell that became that permanent as it resolved, including what costs were paid to cast that spell or what mana was spent to pay those costs."
status = "implemented"
impl_files = ["game/game_object.rs:280"]
test_files = []
notes = ""

[cr_400_7e]
rule = "400.7e"
text = "Abilities that trigger when an object moves from one zone to another (for example, “When this Aura is put into a graveyard from the battlefield”) can find the new object that it became in the zone it moved to when the ability triggered, if that zone is a public zone."
status = "implemented"
impl_files = ["game/triggers.rs:965", "types/game_state.rs:113"]
test_files = []
notes = "The LKI cache (lki_cache in game_state) captures pre-zone-change snapshots, and triggers.rs uses it to resolve the previous-state identity. The new object in the destination zone is tracked via the same ObjectId."

[cr_400_7f]
rule = "400.7f"
text = "Abilities that trigger when an enchanted permanent leaves the battlefield can find the new object that each Aura enchanting that permanent became in its owner's graveyard if it was put into that graveyard at the same time the enchanted permanent left the battlefield. It can also find the new object that each Aura enchanting it became in its owner's graveyard as a result of being put there as a state-based action for not being attached to a permanent. (See rule 704.5m.)"
status = "partial"
impl_files = ["game/sba.rs", "game/triggers.rs"]
test_files = []
notes = "SBA removes unattached Auras to graveyard (game/sba.rs, 704.5m). Triggers firing when the enchanted permanent leaves can find the Aura in the graveyard via ObjectId continuity, but the specific cross-reference to Auras that moved simultaneously is not explicitly tracked. Needs manual verification."

[cr_400_7g]
rule = "400.7g"
text = "If an effect grants a nonland card an ability that allows it to be cast, that ability will continue to apply to the new object that card became after it moved to the stack as a result of being cast this way."
status = "implemented"
impl_files = ["game/casting.rs:205", "types/ability.rs"]
test_files = []
notes = "CastingPermission tracking (ExileWithAltCost, PlayFromExile, etc.) persists on the object through zone changes via casting_permissions clearing rules in zones.rs, which only clears on leaving exile — not on moving to the stack. The permission carries through to the stack."

[cr_400_7h]
rule = "400.7h"
text = "If an effect allows a nonland card to be cast, other parts of that effect can find the new object that card becomes after it moves to the stack as a result of being cast this way."
status = "implemented"
impl_files = ["game/effects/cast_from_zone.rs", "types/ability.rs"]
test_files = []
notes = "The sub_ability chain (ResolvedAbility.sub_ability) allows an effect that casts a spell to reference the resulting stack object via source_id continuity."

[cr_400_7i]
rule = "400.7i"
text = "If an effect allows a land card to be played, other parts of that effect can find the new object that land card becomes after it moves to the battlefield as a result of being played this way."
status = "implemented"
impl_files = ["parser/oracle_effect/mod.rs:441", "parser/oracle_effect/mod.rs:698", "types/ability.rs:645"]
test_files = []
notes = ""

[cr_400_7j]
rule = "400.7j"
text = "If an effect causes an object to move to a public zone, other parts of that effect can find that object. If the cost of a spell or ability causes an object to move to a public zone, that spell or ability's effects can find that object."
status = "implemented"
impl_files = ["game/effects/change_zone.rs", "game/effects/mod.rs"]
test_files = []
notes = "The sub_ability chain preserves source_id across multi-step effects, allowing later effects in the chain to find objects moved to public zones by earlier steps. This is the same mechanism as 400.7h/i."

[cr_400_7k]
rule = "400.7k"
text = "After resolving a madness triggered ability (see rule 702.35), if the exiled card wasn't cast and was moved to a public zone, effects referencing the discarded card can find that object."
status = "partial"
impl_files = ["game/effects/discard.rs:76", "game/effects/discard.rs:165"]
test_files = []
notes = "Madness is implemented: discard.rs routes through the replacement pipeline so Madness exiles the card instead of sending it to the graveyard (CR 702.35). The specific tracking of 'find the object after it moves to a public zone if not cast' is implicit through ObjectId continuity but not explicitly annotated."

[cr_400_7m]
rule = "400.7m"
text = "Stickers on an object in a public zone are retained as it moves to another public zone (see rule 123.5). Any effects from stickers continue to apply to the new object it becomes in that zone."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Stickers (from Unfinity) are not implemented in this engine. This rule is not applicable."

[cr_400_8]
rule = "400.8"
text = "If an object in the exile zone is exiled, it doesn't change zones, but it becomes a new object that has just been exiled."
status = "partial"
impl_files = ["game/effects/change_zone.rs"]
test_files = []
notes = "The change_zone effect handles exile-to-exile implicitly — moving an already-exiled object to exile again results in a ZoneChanged event. However, there is no explicit guard that prevents the zone move or specifically tracks 'same zone' re-exile as a new object identity reset (per CR 400.8 / CR 406.7). Partial coverage."

[cr_400_9]
rule = "400.9"
text = "If a face-up object in the command zone is turned face down, it becomes a new object."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Face-down objects in the command zone only arise in Planechase/Archenemy/Conspiracy variants (plane cards, schemes, etc.) which are not supported. Commander commanders are always face-up. Not applicable."

[cr_400_10]
rule = "400.10"
text = "If an object in the command zone is put into the command zone, it doesn't change zones, but it becomes a new object that has just entered the command zone."
status = "not-applicable"
impl_files = []
test_files = []
notes = "This rule applies to Planechase/Conspiracy variant cards that move within the command zone. Commander commanders are handled by CR 903.9a redirect logic. The specific same-zone identity reset for command zone objects is not applicable to supported game modes."

[cr_400_11]
rule = "400.11"
text = "An object is outside the game if it isn't in any of the game's zones. Outside the game is not a zone."
status = "implemented"
impl_files = ["types/game_state.rs:232"]
test_files = []
notes = "The deck_pools structure (PlayerDeckPool with registered_sideboard / current_sideboard) models cards outside the game (sideboard). Objects not in any Zone enum variant are outside the game. The concept is enforced by the Zone enum not having an 'outside' variant."

[cr_400_11a]
rule = "400.11a"
text = "Cards in a player's sideboard are outside the game. See rule 100.4."
status = "implemented"
impl_files = ["types/game_state.rs:233"]
test_files = []
notes = "PlayerDeckPool.registered_sideboard tracks sideboard cards outside the game. These are not Zone-tracked objects until brought into the game (e.g., via Companion, Wish effects)."

[cr_400_11b]
rule = "400.11b"
text = "Some effects bring cards into a game from outside the game. Those cards remain in the game until the game ends, their owner leaves the game, or a rule or effect removes them from the game, whichever comes first."
status = "partial"
impl_files = ["game/companion.rs", "types/game_state.rs:582"]
test_files = []
notes = "Companion (CR 702.139a) is implemented — it brings a sideboard card into the hand (CompanionToHand action). General 'wish' effects that fetch from outside the game are not implemented. Partial coverage."

[cr_400_11c]
rule = "400.11c"
text = "Cards outside the game can't be affected by spells or abilities, except for characteristic-defining abilities printed on them (see rule 604.3) and spells and abilities that allow those cards to be brought into the game."
status = "implemented"
impl_files = ["types/game_state.rs:232", "game/filter.rs"]
test_files = []
notes = "Filter evaluation (game/filter.rs) only looks at objects in game zones (battlefield, hand, library, graveyard, stack, exile, command). Sideboard cards in deck_pools are never returned by zone or filter queries, so they can't be affected by in-game spells or abilities."

[cr_400_12]
rule = "400.12"
text = "Some effects instruct a player to do something to a zone (such as “Shuffle your hand into your library”). That action is performed on all cards in that zone. The zone itself is not affected."
status = "implemented"
impl_files = ["game/mulligan.rs:205"]
test_files = []
notes = "shuffle_hand_into_library (mulligan.rs) iterates all cards in a player's hand and moves them to the library, then shuffles. The zone collections themselves are Vec fields on the player/state, which persist after the operation."
