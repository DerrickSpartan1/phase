# Comprehensive Rules Section 402: Hand

[_meta]
section = 402
title = "Hand"

[cr_402_1]
rule = "402.1"
text = "The hand is where a player holds cards that have been drawn. Cards can be put into a player's hand by other effects as well. At the beginning of the game, each player draws a number of cards equal to that player's starting hand size, normally seven. (See rule 103, “Starting the Game.”)"
status = "implemented"
impl_files = ["game/mulligan.rs:14", "game/zones.rs:311"]
test_files = ["game/mulligan.rs:288"]
notes = "mulligan.rs annotates CR 103.4 for starting hand size of seven. Drawing places cards into Zone::Hand via zones.rs add_to_zone. The test at line 288 verifies both players have 7 cards in hand after start_mulligan."

[cr_402_2]
rule = "402.2"
text = "Each player has a maximum hand size, which is normally seven cards. A player may have any number of cards in their hand, but as part of their cleanup step, the player must discard excess cards down to the maximum hand size."
status = "implemented"
impl_files = ["game/static_abilities.rs:119", "game/static_abilities.rs:772", "game/turns.rs:266", "game/turns.rs:267", "game/turns.rs:1244", "types/statics.rs:195"]
test_files = []
notes = ""

[cr_402_3]
rule = "402.3"
text = "A player may arrange their hand in any convenient fashion and look at it at any time. A player can't look at the cards in another player's hand but may count those cards at any time."
status = "implemented"
impl_files = []
test_files = []
notes = "Implemented in server-core (filter_state_for_player) which hides opponents' hand card details. Outside crates/engine/src/ so not tracked here."
