# Comprehensive Rules Section 407: Ante

[_meta]
section = 407
title = "Ante"

[cr_407_1]
rule = "407.1"
text = "Earlier versions of the Magic rules included an ante rule as a way of playing “for keeps.” Playing Magic games for ante is now considered an optional variation on the game, and it's allowed only where it's not forbidden by law or by other rules. Playing for ante is strictly forbidden under the Magic: The Gathering Tournament Rules (WPN.Wizards.com/en/rules-documents)."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Ante is not implemented and is not a supported game mode. There is no ante zone in Zone enum. This rule is not applicable."

[cr_407_2]
rule = "407.2"
text = "When playing for ante, each player puts one random card from their deck into the ante zone after determining which player goes first but before players draw any cards. Cards in the ante zone may be examined by any player at any time. At the end of the game, the winner becomes the owner of all the cards in the ante zone."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Ante is not supported. Not applicable."

[cr_407_3]
rule = "407.3"
text = "A few cards have the text “Remove this card from your deck before playing if you're not playing for ante.” These are the only cards that can add or remove cards from the ante zone or change a card's owner. When not playing for ante, players can't include these cards in their decks or sideboards, and these cards can't be brought into the game from outside the game."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Ante cards are not supported. Not applicable."

[cr_407_4]
rule = "407.4"
text = "To ante an object is to put that object into the ante zone from whichever zone it's currently in. The owner of an object is the only player who can ante that object."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Ante is not supported. Not applicable."
