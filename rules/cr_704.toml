[cr_704_5p]
rule = "704.5p"
text = "If a battle or creature is attached to an object or player, it becomes unattached and remains on the battlefield. Similarly, if any nonbattle, noncreature permanent that's neither an Aura, an Equipment, nor a Fortification is attached to an object or player, it becomes unattached and remains on the battlefield."
status = "missing"
impl_files = []
test_files = []
notes = "No SBA check for illegally attached non-Aura, non-Equipment permanents. game/sba.rs only checks Auras (check_unattached_auras) and Equipment (check_unattached_equipment). A battle or creature or other permanent with an attached_to set would not be caught and unattached."

