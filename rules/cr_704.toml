[cr_704_5r]
rule = "704.5r"
text = "If a permanent with an ability that says it can't have more than N counters of a certain kind on it has more than N counters of that kind on it, all but N of those counters are removed from it."
status = "missing"
impl_files = []
test_files = []
notes = "No SBA for maximum counter caps. The engine has no concept of a 'max counter' property on game objects and no check_max_counters function in game/sba.rs. Cards with this constraint (e.g. Darksteel Reactor's \"remove this from game\" when it has 20 charge counters, or Blade of the Oni's cap) would not be enforced."

