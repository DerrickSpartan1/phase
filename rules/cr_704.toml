[cr_704_6a]
rule = "704.6a"
text = "In a Two-Headed Giant game, if a team has 0 or less life, that team loses the game. See rule 810, \"Two-Headed Giant Variant.\""
status = "partial"
impl_files = ["game/sba.rs:130", "game/elimination.rs:16", "game/elimination.rs:29"]
test_files = ["game/sba.rs:1115"]
notes = "The engine uses per-player life totals rather than a shared team life total. When any player hits 0 life in a 2HG game, eliminate_player propagates elimination to the whole team via the team_based flag (elimination.rs:29). This achieves the correct game outcome but does not model the 2HG shared life pool (CR 810.8): in 2HG both players on a team share a single life total starting at 30, and damage can be redirected to either player."

[cr_704_6b]
rule = "704.6b"
text = "In a Two-Headed Giant game, if a team has fifteen or more poison counters, that team loses the game. See rule 810, \"Two-Headed Giant Variant.\""
status = "missing"
impl_files = []
test_files = []
notes = "No shared team poison counter tracking exists. The individual player poison check (check_poison_counters, sba.rs:72) uses a threshold of 10 and applies to each player independently, but CR 704.6c explicitly says to ignore 704.5c in 2HG games and instead use the team-level 15-counter threshold. No team-level poison check or format-conditional threshold switching is implemented."

