[cr_704_6d]
rule = "704.6d"
text = "In a Commander game, if a commander is in a graveyard or in exile and that object was put into that zone since the last time state-based actions were checked, its owner may put it into the command zone. See rule 903, \"Commander.\""
status = "implemented"
impl_files = ["game/commander.rs:29", "game/zones.rs:37"]
test_files = ["game/commander.rs:256", "game/commander.rs:269"]
notes = "Implemented as a zone-change redirect in move_to_zone (zones.rs:37) rather than a discrete SBA loop entry. When any zone move would send a commander to Graveyard or Exile, should_redirect_to_command_zone (commander.rs:29) intercepts and routes to Zone::Command instead. This is architecturally equivalent to the SBA described in CR 704.6d."

