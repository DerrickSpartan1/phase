[cr_704_7]
rule = "704.7"
text = "If multiple state-based actions would have the same result at the same time, a single replacement effect will replace all of them."
status = "partial"
impl_files = ["game/sba.rs:241", "game/replacement.rs"]
test_files = []
notes = "The check_lethal_damage function (sba.rs:241) routes each destruction through the replacement pipeline via replacement::replace_event. However, the engine processes SBA candidates sequentially in a loop (sba.rs:53) rather than collecting all triggered replacements for simultaneous application. A single replacement effect would correctly fire once per creature group but the simultaneous-application guarantee of CR 704.7 is not fully modeled."

[cr_704_8]
rule = "704.8"
text = "If a state-based action results in a permanent leaving the battlefield at the same time other state-based actions were performed, that permanent's last known information is derived from the game state before any of those state-based actions were performed."
status = "missing"
impl_files = []
test_files = []
notes = "Last Known Information (LKI) snapshotting for simultaneous SBA processing is not implemented. The SBA fixpoint loop (sba.rs:53) applies actions sequentially, meaning each action sees the game state after all prior actions in the same iteration. No pre-SBA-pass snapshot is taken or consulted."
