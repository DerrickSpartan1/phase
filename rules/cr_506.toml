# Comprehensive Rules Section 506: Combat Phase

[_meta]
section = 506
title = "Combat Phase"

[cr_506_1]
rule = "506.1"
text = "The combat phase has five steps, which proceed in order: beginning of combat, declare attackers, declare blockers, combat damage, and end of combat. The declare blockers and combat damage steps are skipped if no creatures are declared as attackers or put onto the battlefield attacking (see rule 508.8). There are two combat damage steps if any attacking or blocking creature has first strike (see rule 702.7) or double strike (see rule 702.4)."
status = "implemented"
impl_files = ["game/restrictions.rs:853"]
test_files = []
notes = ""

[cr_506_2]
rule = "506.2"
text = "During the combat phase, the active player is the attacking player; creatures that player controls may attack. During the combat phase of a two-player game, the nonactive player is the defending player; that player, planeswalkers they control, and battles they protect may be attacked."
status = "implemented"
impl_files = ["game/combat.rs:1021"]
test_files = []
notes = ""

[cr_506_2a]
rule = "506.2a"
text = "During the combat phase of a multiplayer game, there may be one or more defending players, depending on the variant being played and the options chosen for it. Unless all the attacking player's opponents automatically become defending players during the combat phase, the attacking player chooses one of their opponents as a turn-based action during the beginning of combat step. (Note that the choice may be dictated by the variant being played or the options chosen for it.) That player becomes the defending player. See rule 802, \"Attack Multiple Players Option,\" rule 803, \"Attack Left and Attack Right Options,\" and rule 809, \"Emperor Variant.\""
status = "partial"
impl_files = ["game/combat.rs:1021"]
test_files = []
notes = "In a two-player game the single opponent is the defending player, which is fully implemented. In multiplayer free-for-all games the engine currently defaults to the next player in seat order as defending player without presenting an interactive choice during the beginning of combat step."

[cr_506_2b]
rule = "506.2b"
text = "In multiplayer games using the shared team turns option, the active team is the attacking team and the nonactive team is the defending team. See rule 805, \"Shared Team Turns Option.\""
status = "not-applicable"
impl_files = []
test_files = []
notes = "Shared team turns (2HG) combat has a defending team concept, but team-based combat targeting is not specifically differentiated from the single-opponent path. Not applicable for current scope."

[cr_506_3]
rule = "506.3"
text = "Only a creature can attack or block. Only a player, a planeswalker, or a battle can be attacked."
status = "implemented"
impl_files = ["game/combat.rs:1021"]
test_files = []
notes = ""

[cr_506_3a]
rule = "506.3a"
text = "If an effect would put a noncreature permanent onto the battlefield attacking or blocking, the permanent does enter the battlefield but it's never considered to be an attacking or blocking permanent."
status = "missing"
impl_files = []
test_files = []
notes = "The engine does not guard against this edge case when entering-attacking effects resolve."

[cr_506_3b]
rule = "506.3b"
text = "If an effect would put a creature onto the battlefield attacking under the control of any player except an attacking player, that creature does enter the battlefield, but it's never considered to be an attacking creature."
status = "missing"
impl_files = []
test_files = []
notes = "Not enforced; change_zone effects that put creatures onto the battlefield attacking do not validate controller is the active player."

[cr_506_3c]
rule = "506.3c"
text = "If an effect would put a creature onto the battlefield attacking either a player not in the game or a permanent that's no longer on the battlefield or isn't either a planeswalker or a battle, that creature does enter the battlefield, but it's never considered to be an attacking creature. See rule 508.4a."
status = "missing"
impl_files = []
test_files = []
notes = "Not enforced; the engine does not validate that the specified attack target is still valid when a creature enters attacking."

[cr_506_3d]
rule = "506.3d"
text = "If an effect puts a creature onto the battlefield attacking during the declare blockers step, combat damage step, or end of combat step, that creature enters the battlefield unblocked. See rule 508.4d."
status = "implemented"
impl_files = ["game/targeting.rs:180", "game/trigger_matchers.rs:458", "parser/oracle_effect/subject.rs:245", "parser/oracle_target.rs:35", "types/ability.rs:1029"]
test_files = []
notes = ""

[cr_506_3e]
rule = "506.3e"
text = "If an effect would put a creature onto the battlefield blocking but the creature it would block isn't attacking the entering creature's controller, a planeswalker that player controls, or a battle that player protects, that creature does enter the battlefield, but it's never considered to be a blocking creature."
status = "missing"
impl_files = []
test_files = []
notes = "Not enforced; entering-blocking validation does not check attacking-target alignment."

[cr_506_3f]
rule = "506.3f"
text = "If an effect would put a creature that's also a battle onto the battlefield attacking or blocking, that permanent enters the battlefield but it's never considered to be an attacking or blocking creature."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Battle card type is not implemented in the engine."

[cr_506_3g]
rule = "506.3g"
text = "If a resolving spell or ability would cause a battle to become an attacking or blocking creature, that part of the effect does nothing."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Battle card type is not implemented in the engine."

[cr_506_4]
rule = "506.4"
text = "A permanent is removed from combat if it leaves the battlefield, if its controller changes, if it phases out, if an effect specifically removes it from combat, if it's a planeswalker that's being attacked and stops being a planeswalker, if it's a battle that's being attacked and stops being a battle, or if it's an attacking or blocking creature that regenerates (see rule 701.19), stops being a creature, or becomes a battle. A creature that's removed from combat stops being an attacking, blocking, blocked, and/or unblocked creature. A planeswalker or battle that's removed from combat stops being attacked."
status = "partial"
impl_files = ["game/combat.rs:1021", "game/restrictions.rs:1058", "game/restrictions.rs:1068"]
test_files = []
notes = "The engine clears combat state when a creature leaves the battlefield (via zone changes). Controller change and phase-out removal are not explicitly modeled. Regeneration removal from combat is also not fully implemented."

[cr_506_4a]
rule = "506.4a"
text = "Once a creature has been declared as an attacking or blocking creature, spells or abilities that would have kept that creature from attacking or blocking don't remove the creature from combat."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional clarification. The engine's restriction checks happen only during the declaration step; post-declaration state changes do not retro-apply restrictions."

[cr_506_4b]
rule = "506.4b"
text = "Tapping or untapping a creature that's already been declared as an attacker or blocker doesn't remove it from combat and doesn't prevent its combat damage."
status = "implemented"
impl_files = ["game/combat_damage.rs:18", "game/combat.rs:669"]
test_files = []
notes = "Combat state is tracked independently of tap state; the engine assigns damage based on combat roles, not tap state at damage resolution."

[cr_506_4c]
rule = "506.4c"
text = "If a creature is attacking a planeswalker or battle, removing that planeswalker or battle from combat doesn't remove that creature from combat. It continues to be an attacking creature, although it is not attacking any player, planeswalker, or battle. It may be blocked. If it is unblocked, it will deal no combat damage."
status = "partial"
impl_files = ["game/combat_damage.rs:365"]
test_files = []
notes = "CR 510.1b handles that an unblocked attacker with no current target deals no damage. However, explicit removal of the planeswalker/battle target during combat without removing the attacker from combat is not fully modeled."

[cr_506_4d]
rule = "506.4d"
text = "A permanent that's both a blocking creature and a planeswalker that's being attacked is removed from combat if it stops being both a creature and a planeswalker. If it stops being one of those card types but continues to be the other, it continues to be either a blocking creature or a planeswalker that's being attacked, whichever is appropriate."
status = "not-applicable"
impl_files = []
test_files = []
notes = "This edge case requires a permanent that is simultaneously a creature and a planeswalker. Not a practically implemented scenario in the current engine."

[cr_506_4e]
rule = "506.4e"
text = "A permanent that's being attacked that is both a planeswalker and a battle is removed from combat if it stops being both a planeswalker and a battle. If it stops being a battle but is still a planeswalker, it is removed from combat only if it is not controlled by its protector. If it stops being a planeswalker but is still a battle, it is not removed from combat. It continues to be a battle that's being attacked."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Battle card type is not implemented."

[cr_506_5]
rule = "506.5"
text = "A creature attacks alone if it's the only creature declared as an attacker during the declare attackers step. A creature is attacking alone if it's attacking but no other creatures are. A creature blocks alone if it's the only creature declared as a blocker during the declare blockers step. A creature is blocking alone if it's blocking but no other creatures are."
status = "partial"
impl_files = ["game/combat.rs:1021", "types/triggers.rs:54"]
test_files = []
notes = "The engine tracks individual attacker/blocker assignments and can determine whether a creature is the sole attacker or blocker. However no explicit 'attacks alone' / 'blocks alone' semantic trigger filter exists; these concepts are evaluated at the trigger-condition level via counts of attackers/blockers."

[cr_506_6]
rule = "506.6"
text = "Some abilities check to see whether or not a creature \"had to attack\" during a particular combat phase. A creature had to attack if one or more effects were requiring that creature to attack at the time attackers were declared in that combat. A creature did not \"have to attack\" if there were no such effects that required it to attack, even if there were no other legal attacks that could have been declared. (See rule 508.)"
status = "missing"
impl_files = []
test_files = []
notes = "No 'had to attack' tracking is implemented."

[cr_506_7]
rule = "506.7"
text = "Some spells state that they may be cast \"only [before/after] [a particular point in the combat phase],\" in which that point may be \"attackers are declared,\" \"blockers are declared,\" \"the combat damage step,\" \"the end of combat step,\" \"the combat phase,\" or \"combat.\""
status = "partial"
impl_files = ["game/casting.rs", "types/ability.rs"]
test_files = []
notes = "Basic combat timing restrictions (e.g., 'only during combat') are supported in the casting restriction system. However the full set of granular combat-point restrictions listed in CR 506.7a–506.7g is not exhaustively verified."

[cr_506_7a]
rule = "506.7a"
text = "A spell that states it may be cast \"only before (or after) attackers are declared\" is referring to the turn-based action of declaring attackers. It may be cast only before (or after) the declare attackers step begins, regardless of whether any attackers are actually declared. (See rule 508.)"
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional clarification of what 'before/after attackers are declared' means. The casting restriction system handles the phase-level check."

[cr_506_7b]
rule = "506.7b"
text = "A spell that states it may be cast \"only before (or after) blockers are declared\" is referring to the turn-based action of declaring blockers. It may be cast only before (or after) the declare blockers step begins, regardless of whether any blockers are actually declared. (See rule 509.)"
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional clarification. See cr_506_7a notes."

[cr_506_7c]
rule = "506.7c"
text = "Some spells state that they may be cast only \"during combat\" or \"during a certain player's combat phase\" in addition to the criteria described in rule 506.7. If a turn has multiple combat phases, such spells may be cast at an appropriate time during any of them."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Multiple combat phases are not implemented. Definitional clarification for that unimplemented mechanic."

[cr_506_7d]
rule = "506.7d"
text = "Some spells state that they may be cast \"only before (or after) [a particular point in the combat phase],\" but don't meet the additional criteria described in rule 506.7c. If a turn has multiple combat phases, such spells may be cast that turn only before (or after) the stated point of the first combat phase."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Multiple combat phases are not implemented."

[cr_506_7e]
rule = "506.7e"
text = "If a spell states that it may be cast \"only before [a particular point in the combat phase],\" but the stated point doesn't exist within the relevant combat phase because the declare blockers step and the combat damage step are skipped (see rule 508.8), then the spell may be cast only before the declare attackers step ends. If the stated point doesn't exist because the relevant combat phase has been skipped, then the spell may be cast only before the precombat main phase ends."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional edge case for cards using these specific casting restrictions. Not applicable for current card coverage scope."

[cr_506_7f]
rule = "506.7f"
text = "If a spell states that it may be cast \"only during combat after blockers are declared,\" but the declare blockers step is skipped that combat phase (see rule 508.8), then the spell may not be cast during that combat phase."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional edge case. Not applicable for current card coverage scope."

[cr_506_7g]
rule = "506.7g"
text = "Rules 506.7 and 506.7a–f apply to abilities that state that they may be activated only at certain times with respect to combat just as they apply to spells that state that they may be cast only at certain times with respect to combat."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Definitional extension of 506.7 to abilities. Covered by the same casting/activation restriction infrastructure."
