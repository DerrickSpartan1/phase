# Comprehensive Rules Section 406: Exile

[_meta]
section = 406
title = "Exile"

[cr_406_1]
rule = "406.1"
text = "The exile zone is essentially a holding area for objects. Some spells and abilities exile an object without any way to return that object to another zone. Other spells and abilities exile an object only temporarily."
status = "implemented"
impl_files = ["game/effects/change_zone.rs:33", "types/game_state.rs:869"]
test_files = []
notes = "Zone::Exile is a first-class zone in the engine. state.exile tracks exiled object IDs. The ExileLink mechanism (state.exile_links) tracks temporary exile (with a return condition). Permanent exile has no link."

[cr_406_2]
rule = "406.2"
text = "To exile an object is to put it into the exile zone from whatever zone it's currently in. An exiled card is a card that's been put into the exile zone."
status = "implemented"
impl_files = ["game/zones.rs:297", "game/effects/change_zone.rs:33"]
test_files = []
notes = "move_to_zone with Zone::Exile handles all exile transitions. The ChangeZone effect with destination: Exile is the canonical way to exile objects."

[cr_406_3]
rule = "406.3"
text = "Exiled cards are, by default, kept face up and may be examined by any player at any time. Cards “exiled face down” can't be examined by any player except when instructions allow it. However, if a player is instructed to look at a card and then exile it face down, or once a player is allowed to look at a card exiled face down, that player may continue to look at that card until it leaves the exile zone or is part of a pile of cards that are shuffled, even if the instruction allowing the player to do so no longer applies."
status = "partial"
impl_files = ["game/effects/change_zone.rs", "types/game_state.rs"]
test_files = []
notes = "Exile zone is a public zone (objects visible to all). Face-down exile exists for Morph/Disguise/Manifest cards (face_down flag on GameObject). The specific 'continue to look' permission tracking for face-down exiled cards is not modeled — the engine does not restrict which players can view face-down exiled cards or track per-player viewing permissions."

[cr_406_3a]
rule = "406.3a"
text = "A card exiled face down has no characteristics, but the spell or ability that exiled it may allow it to be played from exile. Unless that card is being cast face down (see rule 708.4), the card is turned face up just before the player announces that they are playing the card (see rule 601.2)."
status = "partial"
impl_files = ["game/casting.rs:117", "types/ability.rs"]
test_files = []
notes = "PlayFromExile and ExileWithAltCost permissions (types/ability.rs) allow casting from exile. Face-down objects in exile lose characteristics (face_down = true suppresses name/type/abilities). The 'turned face up just before casting' step is handled implicitly when casting.rs evaluates the object, but there is no explicit 'turn face up' event emitted before announcement. Partial."

[cr_406_3b]
rule = "406.3b"
text = "Some spells and abilities allow a player to cast spells with certain qualities from among face-down cards in exile. A player may cast such a spell only if they are allowed to look at the face-down card in exile and if the resulting spell has the specified qualities."
status = "partial"
impl_files = ["game/casting.rs"]
test_files = []
notes = "The engine enforces that only objects with explicit CastingPermission can be cast from exile. However, face-down exile pile lookup (choosing from a pile of face-down cards when you can't see them) is not implemented — all cards in exile have known identity to the controller."

[cr_406_4]
rule = "406.4"
text = "Face-down cards in exile should be kept in separate piles based on when they were exiled and how they were exiled. If a player is instructed to choose an exiled card, the player may choose a specific face-down card only if the player is allowed to look at that card. Otherwise, they may choose a pile of face-down exiled cards, and then a card is chosen at random from within that pile. If choosing such a card is part of casting a spell or activating an ability, the chosen card isn't revealed until after that cost is fully paid. (See rule 601.2i.)"
status = "partial"
impl_files = ["types/game_state.rs:869"]
test_files = []
notes = "state.exile is a flat Vec<ObjectId>. The engine does not group face-down exiled cards into separate piles by source or timing. The ExileLink mechanism (exile_links) tracks some grouping but only for cards exiled together by a specific effect. Random pile selection for face-down exile is not implemented."

[cr_406_5]
rule = "406.5"
text = "Exiled cards that might return to the battlefield or any other zone should be kept in separate piles to keep track of their respective ways of returning. Exiled cards that may have an impact on the game due to their own abilities (such as cards with haunt) or the abilities of the cards that exiled them should likewise be kept in separate piles."
status = "implemented"
impl_files = ["types/game_state.rs:914"]
test_files = []
notes = ""

[cr_406_6]
rule = "406.6"
text = "An object may have one ability printed on it that causes one or more cards to be exiled, and another ability that refers either to “the exiled cards” or to cards “exiled with [this object].” These abilities are linked: the second refers only to cards that have been exiled due to the first. See rule 607, “Linked Abilities.”"
status = "implemented"
impl_files = ["game/effects/change_zone.rs:870", "game/engine.rs:3701", "game/filter.rs:129", "types/game_state.rs:129"]
test_files = []
notes = ""

[cr_406_7]
rule = "406.7"
text = "If an object in the exile zone becomes exiled, it doesn't change zones, but it becomes a new object that has just been exiled."
status = "partial"
impl_files = ["game/effects/change_zone.rs"]
test_files = []
notes = "The engine does not have a guard that detects 'object is already in exile' and short-circuits the zone move. If an exiled object is targeted for exile again, move_to_zone runs and emits a ZoneChanged event with from=Exile, to=Exile, which does change the object's position in the exile list. The 'becomes a new object' identity reset is implicit (same ObjectId, no explicit reset). Not fully correct per the rule — needs explicit handling."

[cr_406_8]
rule = "406.8"
text = "Previously, the exile zone was called the “removed-from-the-game zone.” Cards that were printed with text that “removes [an object] from the game” exiles that object. The same is true for cards printed with text that “sets [an object] aside.” Cards that were printed with that text have received errata in the Oracle card reference."
status = "not-applicable"
impl_files = []
test_files = []
notes = "This is an errata/legacy rule for pre-M10 card text. All Oracle text used by this engine comes from MTGJSON with current errata. No engine code needs to handle 'removed from the game' phrasing."
