name: Deploy Staging (GitHub Pages)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy Staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown
          cache-shared-key: rust-wasm

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.114

      - name: Cache binaryen
        id: binaryen-cache
        uses: actions/cache@v4
        with:
          path: binaryen-version_123
          key: binaryen-123-x86_64-linux

      - name: Install binaryen
        if: steps.binaryen-cache.outputs.cache-hit != 'true'
        run: curl -L https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz | tar xz

      - name: Add binaryen to PATH
        run: echo "$PWD/binaryen-version_123/bin" >> $GITHUB_PATH

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Set cache keys
        id: cache-keys
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache MTGJSON data
        id: mtgjson-cache
        uses: actions/cache@v4
        with:
          path: data/mtgjson
          key: mtgjson-${{ steps.cache-keys.outputs.week }}
          restore-keys: mtgjson-

      - name: Download MTGJSON data
        if: steps.mtgjson-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/mtgjson
          curl -fSL -o data/mtgjson/AtomicCards.json "https://mtgjson.com/api/v5/AtomicCards.json"

      - name: Generate card data and coverage (from source)
        run: |
          mkdir -p data
          cargo run --release --bin oracle-gen --features cli -- data/ --stats --names-out data/card-names.json > data/card-data.json
          cargo run --release --bin coverage-report -- data/ --all > data/coverage-data.json
          jq '{total_cards, supported_cards, coverage_pct, coverage_by_format}' data/coverage-data.json > data/coverage-summary.json
          cp data/card-data.json client/public/card-data.json
          cp data/card-names.json client/public/card-names.json
          cp data/coverage-data.json client/public/coverage-data.json
          cp data/coverage-summary.json client/public/coverage-summary.json

      - name: Validate card-data against engine schema
        # Deploy gate — parse the freshly produced card-data through the same
        # `CardDatabase::from_export` path the WASM uses at runtime. Catches
        # "this commit's engine cannot read this commit's card-data" before R2
        # ever sees a broken file. Pairs with the content-addressed copy below.
        run: cargo run --release --bin card-data-validate -- data/card-data.json

      - name: Compute content-addressed card-data filename
        id: card-data-hash
        # Pin each WASM bundle to the exact card-data it was built against by
        # publishing card-data at `card-data-<hash>.json` (immutable URL with
        # long cache) and baking that URL into the JS bundle via Vite's
        # `__CARD_DATA_URL__` define. New deploys publish a new hash; old WASM
        # bundles in browser caches keep resolving their own old hashed URL.
        # WASM/card-data schema drift across deploys becomes structurally
        # impossible.
        run: |
          HASH=$(sha256sum data/card-data.json | awk '{print substr($1, 1, 16)}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "filename=card-data-$HASH.json" >> "$GITHUB_OUTPUT"
          cp data/card-data.json "data/card-data-$HASH.json"
          cp "data/card-data-$HASH.json" "client/public/card-data-$HASH.json"
          echo "Content-addressed card-data: card-data-$HASH.json"

      - name: Generate Scryfall data
        run: ./scripts/gen-scryfall-images.sh

      - name: Generate coverage badge endpoints
        run: |
          cargo run --release --bin coverage-report -- data/ --write-stats data/coverage-stats.json > /dev/null
          ./scripts/gen-badge-endpoints.sh data/coverage-stats.json data/badges

      - name: Upload data to R2 (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CARD_DATA_FILENAME: ${{ steps.card-data-hash.outputs.filename }}
        run: |
          # Content-addressed copy: immutable, year-long cache. Each WASM
          # bundle is baked with its own hashed URL, so old browser caches
          # keep resolving the old hash even after this deploy publishes a new one.
          npx wrangler r2 object put "phase-rs-data/staging/$CARD_DATA_FILENAME" --file "client/public/$CARD_DATA_FILENAME" --remote --content-type application/json --cache-control "public, max-age=31536000, immutable"
          # Legacy unhashed copy: kept for local dev parity and any consumer that
          # still resolves `/card-data.json` directly. Short cache.
          npx wrangler r2 object put phase-rs-data/staging/card-data.json --file client/public/card-data.json --remote --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/staging/coverage-data.json --file client/public/coverage-data.json --remote --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/staging/coverage-summary.json --file client/public/coverage-summary.json --remote --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/staging/scryfall-data.json --file client/public/scryfall-data.json --remote --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          for f in data/badges/*.json; do
            name=$(basename "$f")
            npx wrangler r2 object put "phase-rs-data/badges/$name" --file "$f" --remote --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          done

      - name: Verify R2 uploads landed
        # Wrangler v4 silently writes to a local emulator unless --remote is
        # passed. This step fails the deploy if the hashed card-data URL the
        # WASM bundle will be pinned to is not actually fetchable from R2.
        env:
          CARD_DATA_FILENAME: ${{ steps.card-data-hash.outputs.filename }}
        run: |
          URL="https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/staging/$CARD_DATA_FILENAME"
          status=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$status" != "200" ]; then
            echo "::error::R2 upload verification failed: $URL returned $status"
            exit 1
          fi
          echo "Verified $URL ($status)"

      - name: Build WASM
        run: ./scripts/build-wasm.sh release

      - name: Use preview icons
        run: |
          cp client/public/preview-icons/favicon.ico client/public/favicon.ico
          cp client/public/preview-icons/favicon-16x16.png client/public/favicon-16x16.png
          cp client/public/preview-icons/favicon-32x32.png client/public/favicon-32x32.png
          cp client/public/preview-icons/logo.png client/public/logo.png
          cp client/public/preview-icons/icons/icon-192.png client/public/icons/icon-192.png
          cp client/public/preview-icons/icons/icon-512.png client/public/icons/icon-512.png
          cp client/public/preview-icons/icons/apple-touch-icon.png client/public/icons/apple-touch-icon.png

      - name: Build frontend
        env:
          # CRITICAL: point at the content-addressed card-data URL, not the
          # mutable `card-data.json`. Vite bakes this string into the JS
          # bundle's `__CARD_DATA_URL__`, statically pinning this WASM build
          # to its own card-data forever. New deploys get a new hash; old
          # browser caches keep resolving the old hash.
          CARD_DATA_URL: "https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/staging/${{ steps.card-data-hash.outputs.filename }}"
          COVERAGE_DATA_URL: "https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/staging/coverage-data.json"
          COVERAGE_SUMMARY_URL: "https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/staging/coverage-summary.json"
          SCRYFALL_DATA_URL: "https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/staging/scryfall-data.json"
          AUDIO_BASE_URL: "https://pub-fc5b5c2c6e774356ae3e730bb0326394.r2.dev/audio"
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      - name: Remove large data files from dist (served from R2)
        # Strip the unhashed card-data and the 16-hex-char hashed copy that
        # vite picked up from `client/public/`. Both live on R2 — Pages only
        # ships the JS/WASM bundle that references them. The hex glob is
        # specifically scoped so `card-data-meta.json` (consumed at runtime
        # by `useCardDataMeta`) survives.
        run: |
          rm -f client/dist/card-data.json client/dist/card-data.json.br \
            client/dist/coverage-data.json client/dist/coverage-data.json.br \
            client/dist/coverage-summary.json client/dist/coverage-summary.json.br \
            client/dist/scryfall-data.json client/dist/scryfall-data.json.br
          find client/dist -maxdepth 1 \
            -regex '.*/card-data-[0-9a-f]\{16\}\.json\(\.br\)?' -delete

      - name: SPA fallback for GitHub Pages
        run: cp client/dist/index.html client/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
